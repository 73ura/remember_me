services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-remember_me_development}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-remember_me_development}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: ["./bin/docker-entrypoint", "./bin/rails", "server", "-b", "0.0.0.0"]
    volumes:
      - .:/rails
      - /rails/node_modules
      - /rails/vendor/bundle
    ports:
      - "127.0.0.1:${RAILS_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-remember_me_development}
      RAILS_ENV: ${RAILS_ENV:-development}

volumes:
  postgres_data: